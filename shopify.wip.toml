# This file stores configurations for your Shopify app.
name = "Next Generation Event subscription"
application_url = "https://www.app.example.com/"
embedded = true

# [START get-access-scopes]
[access_scopes]
scopes = "write_products"
# [END get-access-scopes]

# [START change-api-version]
[events]
api_version = "unstable"
# [END change-api-version]

# [START subcribe-create-handle]
[[events.subscription]]
handle = "create_product_events"
# [END subcribe-create-handle]

# [START subcribe-create-topic-action]
topic = "Product"
actions = ["create"]
# [END subcribe-create-topic-action]

# [START subcribe-create-uri]
uri = "/nges/app/products-create"
# [END subcribe-create-uri]

# [START subscribe-delete]
[[events.subscription]]
handle = "delete_product_events"

topic = "Product"
actions = ["delete"]

uri = "/nges/app/products-delete"
# [END subscribe-delete]

# [START subscribe-update]
[[events.subscription]]
handle = "update_product_events"

topic = "Product"
actions = ["update"]
# [END subscribe-update]
# [START subscribe-update-triggers]
triggers = [                                                                                                                                              
    "product.variants.price",                                                                                                                             
    "product.variants.compareAtPrice",
    "product.variants.sku"
]                                                                                                                                                         
# [END subscribe-update-triggers]
uri = "/nges/app/products-update"

# [START subscribe-update-query]
query = """                                                                                                                                               
{                                                                                                                                                       
    productVariant(id: $variantsId) {
        id
        price
        compareAtPrice
        sku
        product {
            id
            title
            status
        }
    }
}      
"""
# [END subscribe-update-query]
# [START subscribe-update-query-filter]
query_filter = "product.status:'ACTIVE'"
# [END subscribe-update-filter]
