# Tutorial excerpt: Product Events subscriptions (no client_id / auth — not a full app config).
# Region tag names match shopify.app.toml. Copy into your real shopify.app.toml or use for docs.

name = "Events subscription"
application_url = "https://example.com/"
embedded = true

# [START events-access-scopes]
[access_scopes]
scopes = "write_products"
# [END events-access-scopes]

[build]
automatically_update_urls_on_dev = true

# [START events-create-configuration]
[events]
api_version = "unstable"

[[events.subscription]]
handle = "create_product_events"

topic = "Product"
actions = ["create"]

uri = "/events/app/products-create"
# [END events-create-configuration]

# [START events-delete-configuration]
[[events.subscription]]
handle = "delete_product_events"

topic = "Product"
actions = ["delete"]

uri = "/events/app/products-delete"

# [END events-delete-configuration]

# [START events-update-configuration]
[[events.subscription]]
handle = "update_product_events"

topic = "Product"
actions = ["update"]

# [END events-update-configuration]

# [START events-update-triggers]
triggers = [
    "product.variants.price",
    "product.variants.compareAtPrice"
]
# [END events-update-triggers]

# [START events-update-uri]
uri = "/events/app/products-update"
# [END events-update-uri]

# [START events-update-query]
query = """
query price_change($productId: ID!, $variantsId: ID!){
  productVariant(id: $variantsId) {
    id
    price
    compareAtPrice
  }
  product(id: $productId) {
      id
      title
      status
  }
}
"""
# [END events-update-query]

# [START events-update-query-filter]
query_filter = "product.status:'ACTIVE'"
# [END events-update-query-filter]
