# This file stores configurations for your Shopify app.
client_id = "01a3f8a07f88862a60c927791c5a176b"
name = "Next Gen Events subscription"
application_url = "https://www.app.example.com/"
embedded = true

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

[webhooks]
api_version = "2026-04"

[access_scopes]
scopes = "write_products"

[events]
api_version = "unstable"

[[events.subscription]]
handle = "create_product_events"

topic = "Product"
actions = ["create"]

uri = "/events/app/products-create"

[[events.subscription]]
handle = "delete_product_events"

topic = "Product"
actions = ["delete"]

uri = "/events/app/products-delete"

[[events.subscription]]
handle = "update_product_events"

topic = "Product"
actions = ["update"]

triggers = [
    "product.variants.price",
    "product.variants.compareAtPrice"
]
uri = "/events/app/products-update"

query = """
{
    productVariant(id: $variantsId) {
        id
        price
        compareAtPrice
        sku
        product {
            id
            title
            status
        }
    }
}
"""
query_filter = "product.status:'ACTIVE'"
